<script type="text/javascript">
	var i = 0; // starting point/ start index - we're gonna have an array of images and we LOOP through THOSE (imgaes).
	var images = []; //Images Array
	var time = 5000; //the time in miliseconds BETWEEN each image switch

	//Image list  - this will be ARRAY VALUES - with image paths
	images[0] ='Me_Pictures/lighthouse_c1920x1080.jpg';
	images[1] ='SlideShow_Pictures/2-1920x1080.jpg';
	images[2] ='SlideShow_Pictures/3-1920x1080.jpg';
	images[3] ='SlideShow_Pictures/4-1920x1080.jpg';
	images[4] ='SlideShow_Pictures/5-1920x1080.jpg';
	images[5] ='SlideShow_Pictures/6-1920x1080.jpg';
	images[6] ='SlideShow_Pictures/7-1920x1080.jpg';
	images[7] ='SlideShow_Pictures/8-1920x1080.jpg';
	images[8] ='SlideShow_Pictures/9-1920x1080.jpg';
	images[9] ='SlideShow_Pictures/10-1920x1080.jpg';
	//Function Chnage Image
	function changeImg(){
		document.slide.src = images[i]; //we "create" this because we put the "name attribute of the slide" /the name ATTRIBUTE of "slide" - for our image, then we wanna grab the source (src) and "set  = images[i]"

		if(i < images.length - 1){
			i++;
		}else{
			i = 0;
		}

		setTimeout("changeImg()", time);
	}
	window.onload = changeImg;

	//images.length (in this case) it's gonna be "3" because there's "3" different indexes - but indexes are 0-Based. So basicaly - we want to CHECK IF it's the last index of "2". This is "3" so we-re just going o TAKE AWAY one from that: "images.length - 1".
	//If that is TRUE we just want to INCREMENT (i++) by "1".
	//If it's at the last INDEX - WE WANNA TO RESET TO "0".
	//{} - then we want to RUN this function however many seconds we have up here. For that we can use "setTimeout"(). Inside we put "the function" -"changeImg()" - and we want to run that EVERY "3" seconds. "time)".

	//We wanna go - OUTSIDE the function() - and we want this "CHANGE IMAGE" to run initially - when the PAGE LOADS.

	//https://www.youtube.com/watch?v=4YQ4svkETS0
</script>
